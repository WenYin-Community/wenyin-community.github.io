<!-- 
    404 错误页面
    使用 dnpw.org 提供的 404 公益页面模板
    项目主页: https://www.dnpw.org/404
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title data-zh="页面未找到 - 404 错误" data-en="Page Not Found - 404 Error">页面未找到 - 404 错误</title>
    <meta name="description" content="The page you are looking for could not be found.">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon/favicon.ico">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="./assets/css/style.css" rel="stylesheet">

    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-success);
            color: #fff;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .error-message {
            font-size: 1.5rem;
            font-weight: 300;
        }

        .error-description {
            font-size: 1rem;
            opacity: 0.8;
        }

        .btn-home {
            background: #fff;
            color: #667eea;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .error-icon {
            font-size: 4rem;
            opacity: 0.6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <div class="error-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="error-code">404</div>
                    <h2 class="error-message mb-3" data-zh="页面未找到" data-en="Page Not Found">页面未找到</h2>
                    <p class="error-description mb-4" data-zh="抱歉，您访问的页面不存在或已被移除。" data-en="Sorry, the page you are looking for does not exist or has been removed.">抱歉，您访问的页面不存在或已被移除。</p>
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="/" class="btn btn-home">
                            <i class="fas fa-home me-2"></i><span data-zh="返回首页" data-en="Back to Home">返回首页</span>
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-light rounded-pill px-4 py-2">
                            <i class="fas fa-arrow-left me-2"></i><span data-zh="返回上一页" data-en="Go Back">返回上一页</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="./assets/js/main.js"></script>
    
    <!-- dnpw.org 404 公益页面脚本（备用） -->
    <!-- <script src="//cdn.zhaolinlang.com/cdn.dnpw.org/404/v3.min.js" maincolor="#f00" tips="" error="" jumptime="-1" jumptarget="/" charset="utf-8"></script> -->
</body>
</html>
